<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư Viện Spine Tự Động</title>
    <script src="https://unpkg.com/@esotericsoftware/spine-player@4.2.*/dist/iife/spine-player.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@esotericsoftware/spine-player@4.2.*/dist/spine-player.css">
    <style>
        body { font-family: sans-serif; background: #2b2b2b; color: white; padding: 20px; margin: 0; }
        h1 { text-align: center; }
        .gallery { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .character-card { background: #1e1e1e; padding: 15px; border-radius: 10px; width: 400px; }
        .player-container { width: 100%; height: 400px; }
        h3 { text-align: center; color: #4CAF50; overflow: hidden; text-overflow: ellipsis; }
        #loading { text-align: center; font-size: 20px; color: #aaa; }
    </style>
</head>
<body>
    <h1>Thư Viện Spine Animation (Auto Scan)</h1>
    <div id="loading">Đang quét thư mục assets...</div>
    <div class="gallery" id="gallery"></div>

    <script>
        // --- CẤU HÌNH THÔNG TIN CỦA BẠN TẠI ĐÂY ---
        const username = "dinhhung173"; 
        const repo = "SpineGallery";
        // ----------------------------------------

        async function initGallery() {
            const gallery = document.getElementById('gallery');
            const loading = document.getElementById('loading');

            try {
                // 1. Gọi API GitHub để lấy danh sách folder trong assets
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/assets`);
                const items = await response.json();
                
                const folders = items.filter(item => item.type === 'dir');
                loading.style.display = 'none';

                if (folders.length === 0) {
                    loading.innerText = "Không tìm thấy thư mục con nào trong assets.";
                    loading.style.display = 'block';
                    return;
                }

                for (const folder of folders) {
                    const folderName = folder.name;
                    
                    // 2. Quét tiếp bên trong folder đó để tìm file skel và atlas
                    const folderRes = await fetch(folder.url);
                    const files = await folderRes.json();
                    
                    const skelFile = files.find(f => f.name.endsWith('.skel.bytes'));
                    const atlasFile = files.find(f => f.name.endsWith('.atlas.txt') || f.name.endsWith('.atlas'));

                    if (skelFile && atlasFile) {
                        // 3. Tạo giao diện cho nhân vật
                        const card = document.createElement('div');
                        card.className = 'character-card';
                        card.innerHTML = `<h3>${folderName}</h3><div id="player-${folderName}" class="player-container"></div>`;
                        gallery.appendChild(card);

                        // 4. Khởi tạo Spine Player
                        new spine.SpinePlayer(`player-${folderName}`, {
                            skelUrl: skelFile.download_url,
                            atlasUrl: atlasFile.download_url,
                            showControls: true,
                            alpha: true,
                            backgroundColor: "#00000000",
                            premultipliedAlpha: true
                        });
                    }
                }
            } catch (error) {
                console.error(error);
                loading.innerText = "Lỗi khi quét dữ liệu. Hãy kiểm tra lại kết nối hoặc tên Repo.";
            }
        }

        initGallery();
    </script>
</body>
